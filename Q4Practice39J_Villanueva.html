<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>JavaScript For Loop</h2>

    <p id="Sample2"></p>

   <script>
        let Sample2= "";
        let y = 0;
        while (y < 5) {
        Sample2 += "<br>The number is " + y;
        y++;
        }
        document.getElementById("sample2").innerHTML = Sample2;
    </script>
</body>
